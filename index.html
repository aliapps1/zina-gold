<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZINA Gold</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">

    <h1>ZINA Gold</h1>

    <div class="card">
      <h2>Gold Balance</h2>
      <p id="gold">12.45g</p>
    </div>

    <div class="card">
      <h2>AED Value</h2>
      <p id="aed">AED 3,486</p>
    </div>

    <div class="card">
      <h2>Convert Gold → AED</h2>
      <input id="grams" type="number" value="1" />
      <button onclick="convert()">Convert</button>
      <p id="result"></p>
    </div>

    <div class="card">
      <h2>ATM Simulation</h2>
      <input id="withdraw" type="number" value="500" />
      <button onclick="withdraw()">Simulate</button>
      <p id="withdrawResult"></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
